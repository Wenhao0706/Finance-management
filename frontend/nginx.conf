server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/* to the backend container (same Docker network).
    # 'backend' resolves via Docker DNS to the finance-backend service.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Backend health passthrough — used by Cloudflare Tunnel + uptime monitors.
    location = /health {
        proxy_pass         http://backend:8080/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Long-cache hashed static assets — Angular emits content-hashed filenames.
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback — let Angular's router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression for text-y responses.
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers.
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # HSTS — force HTTPS for 1 year, apply to subdomains, request preload list inclusion.
    # Only emitted on HTTPS responses (Cloudflare terminates TLS, so all requests here are over TLS).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — permissive enough for Firebase Auth, App Check, reCAPTCHA, Google Fonts.
    # Firebase SDK requires 'unsafe-inline'/'unsafe-eval' for its hosted auth iframe and bundled runtime.
    # Tighten later when moving off client-side Firebase SDK.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseappcheck.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com wss://*.firebaseio.com; frame-src 'self' https://*.firebaseapp.com https://www.google.com https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Don't expose nginx version.
    server_tokens off;
}
