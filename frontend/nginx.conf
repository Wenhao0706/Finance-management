server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/* to the backend container (same Docker network).
    # 'backend' resolves via Docker DNS to the finance-backend service.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Backend health passthrough — used by Cloudflare Tunnel + uptime monitors.
    location = /health {
        proxy_pass         http://backend:8080/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Long-cache hashed static assets — Angular emits content-hashed filenames.
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback — let Angular's router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression for text-y responses.
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers (CSP intentionally permissive — Firebase needs eval/inline).
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Don't expose nginx version.
    server_tokens off;
}
