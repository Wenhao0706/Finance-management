<div class="form-page">
  <div class="page-head">
    <div>
      <div class="page-eyebrow">Take your time · no rush</div>
      <h1 class="page-title">Record a transaction.</h1>
    </div>
  </div>

  <form class="add-stage" #txForm="ngForm" (ngSubmit)="onSubmit()" novalidate>

    @if (errorMessage()) {
      <div class="form-error" role="alert" aria-live="assertive">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- ===== LEFT PANEL — Category picker ===== -->
    <aside class="add-stage-left">
      <div class="cat-panel">
        <div class="field-label-tiny">Category</div>
        @if (loadingCategories()) {
          <div class="select-skeleton" aria-busy="true" aria-label="Loading categories"></div>
        } @else {
          <div class="cat-panel-grid">
            <button *ngFor="let cat of filteredCategories"
                    type="button"
                    class="cat-tile"
                    [class.on]="form.category === cat.name"
                    (click)="form.category = cat.name"
                    [disabled]="saving()">
              <div class="cat-tile-icon" [class]="categorySlug(cat.name)" aria-hidden="true" [innerHTML]="categoryIcon(cat.name)"></div>
              <div class="cat-tile-name">{{ cat.name }}</div>
            </button>
          </div>
        }
      </div>
    </aside>

    <!-- ===== RIGHT PANEL — Type + Amount + Description + When ===== -->
    <div class="add-stage-right">
      <div class="amount-stage">
        <div class="amount-stage-toggle" role="radiogroup" aria-label="Transaction type">
          <button type="button"
                  class="type-chip"
                  data-type="expense"
                  [class.on]="form.type === 'expense'"
                  [attr.aria-pressed]="form.type === 'expense'"
                  (click)="setType('expense')"
                  [disabled]="saving()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            Expense
          </button>
          <button type="button"
                  class="type-chip"
                  data-type="income"
                  [class.on]="form.type === 'income'"
                  [attr.aria-pressed]="form.type === 'income'"
                  (click)="setType('income')"
                  [disabled]="saving()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            Income
          </button>
        </div>

        <div class="amount-display" [class.has-value]="(form.amount ?? 0) > 0">
          <span class="amount-currency">$</span>
          <input class="amount-input"
                 #amountFieldEl
                 type="text"
                 inputmode="decimal"
                 autocomplete="off"
                 [(ngModel)]="amountInput"
                 name="amount"
                 (input)="onAmountInput()"
                 placeholder="0"
                 aria-label="Amount"
                 [disabled]="saving()">
          <span class="amount-decimals" [class.dim]="!hasAmountCents">{{ amountCentsDisplay }}</span>
        </div>
        <div class="amount-helper" [class.warn]="amountHelperWarn">{{ amountHelperText }}</div>

        <div class="amount-quick">
          <button *ngFor="let q of quickAmounts"
                  type="button"
                  class="quick-chip"
                  [class.on]="parsedAmount === q"
                  (click)="setQuickAmount(q)"
                  [disabled]="saving()">${{ q | number }}</button>
        </div>
      </div>

      <div class="add-details">
        <div class="add-detail-card">
          <div class="field-label-tiny">What was it for?</div>
          <input class="text-input"
                 type="text"
                 [(ngModel)]="form.description"
                 name="description"
                 placeholder="e.g. Tesco — weekly groceries"
                 autocomplete="off"
                 maxlength="120"
                 required
                 [disabled]="saving()">
        </div>
        <div class="add-detail-card">
          <div class="field-label-tiny">When?</div>
          <div class="date-shortcuts">
            <button type="button" class="date-chip"
                    [class.on]="dateShortcut === 'today'"
                    (click)="setDateShortcut('today')"
                    [disabled]="saving()">Today</button>
            <button type="button" class="date-chip"
                    [class.on]="dateShortcut === 'yesterday'"
                    (click)="setDateShortcut('yesterday')"
                    [disabled]="saving()">Yesterday</button>
            <button type="button" class="date-chip date-chip-pick"
                    [class.on]="dateShortcut === 'pick'"
                    (click)="openCustomDate()"
                    [disabled]="saving()">
              <ng-container *ngIf="dateShortcut !== 'pick'">Pick a day…</ng-container>
              <ng-container *ngIf="dateShortcut === 'pick'">{{ form.date | date:'mediumDate' }}</ng-container>
            </button>
            <input #datePickerEl
                   type="date"
                   class="date-picker-hidden"
                   [(ngModel)]="form.date"
                   name="date"
                   (change)="onCustomDate()"
                   [disabled]="saving()">
          </div>
        </div>
      </div>
    </div>

    <!-- Sticky save bar -->
    <div class="add-savebar" [class.ready]="formReady">
      <div class="add-savebar-status">
        <ng-container *ngIf="formReady">
          <strong>All set</strong> — tap save to record it
        </ng-container>
        <ng-container *ngIf="!formReady">
          <strong>Almost there</strong> — still need {{ missingPiecesText }}
        </ng-container>
      </div>
      <div class="add-savebar-actions">
        <button type="button" class="btn btn-ghost" (click)="router.navigate(['/transactions'])" [disabled]="saving()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="!formReady || saving() || loadingCategories()">
          @if (saving()) {
            <span class="btn-spinner" aria-hidden="true"></span>
            <span>Saving…</span>
          } @else {
            <span>Save transaction</span>
          }
        </button>
      </div>
    </div>
  </form>
</div>
