<div class="budget-settings">
  <header class="page-head">
    <div>
      <div class="page-eyebrow">{{ humanPeriod }}</div>
      <h1 class="page-title">Your monthly plan.</h1>
      <p class="page-meta">Tell us roughly how much you earn and how you'd like to split it. We'll do the maths.</p>
    </div>
  </header>

  <div *ngIf="loading()" class="state-msg">Loading your plan…</div>
  <div *ngIf="error()" class="state-msg error" role="alert">{{ error() }}</div>

  <ng-container *ngIf="!loading() && snapshot">
    <section class="card amount-card">
      <div class="field-label-tiny">Expected monthly income</div>
      <div class="amount-inline">
        <span class="amount-pre">$</span>
        <input class="amount-in"
               type="text"
               inputmode="decimal"
               [(ngModel)]="expectedIncomeInput"
               [placeholder]="derivedPlaceholder">
      </div>
      <p class="hint">Leave blank to use last month's actual income.</p>
    </section>

    <div class="presets-head">
      <div class="field-label-tiny">Pick a plan — or build your own</div>
    </div>

    <div class="preset-grid">
      <button type="button" class="preset"
              [class.on]="activePreset === 'balanced'"
              (click)="applyPreset('balanced')">
        <div class="preset-on-tag">● Active</div>
        <div class="preset-name">Balanced</div>
        <div class="preset-helper">The classic 50/30/20. Good starting point.</div>
        <div class="preset-split">
          <span class="needs"   style="width: 50%"></span>
          <span class="wants"   style="width: 30%"></span>
          <span class="savings" style="width: 20%"></span>
        </div>
        <div class="preset-nums"><span>50% needs</span><span>30% wants</span><span>20% savings</span></div>
      </button>

      <button type="button" class="preset"
              [class.on]="activePreset === 'saver'"
              (click)="applyPreset('saver')">
        <div class="preset-on-tag">● Active</div>
        <div class="preset-name">Saver</div>
        <div class="preset-helper">Less spending, more set aside.</div>
        <div class="preset-split">
          <span class="needs"   style="width: 50%"></span>
          <span class="wants"   style="width: 20%"></span>
          <span class="savings" style="width: 30%"></span>
        </div>
        <div class="preset-nums"><span>50% needs</span><span>20% wants</span><span>30% savings</span></div>
      </button>

      <button type="button" class="preset"
              [class.on]="activePreset === 'conservative'"
              (click)="applyPreset('conservative')">
        <div class="preset-on-tag">● Active</div>
        <div class="preset-name">Conservative</div>
        <div class="preset-helper">Bigger needs cushion for tight months.</div>
        <div class="preset-split">
          <span class="needs"   style="width: 60%"></span>
          <span class="wants"   style="width: 25%"></span>
          <span class="savings" style="width: 15%"></span>
        </div>
        <div class="preset-nums"><span>60% needs</span><span>25% wants</span><span>15% savings</span></div>
      </button>

      <button type="button" class="preset preset-custom"
              [class.on]="activePreset === 'custom'"
              (click)="applyPreset('custom')">
        <div class="preset-on-tag">● Active</div>
        <div class="preset-name">Custom</div>
        <div class="preset-helper">Edit each percent yourself.</div>
        <div class="custom-grid">
          <label>
            <span>Needs</span>
            <span class="num-wrap"><input type="number" min="0" max="100" step="1" [(ngModel)]="needsPctInput"><span class="suf">%</span></span>
          </label>
          <label>
            <span>Wants</span>
            <span class="num-wrap"><input type="number" min="0" max="100" step="1" [(ngModel)]="wantsPctInput"><span class="suf">%</span></span>
          </label>
          <label>
            <span>Savings</span>
            <span class="num-wrap"><input type="number" min="0" max="100" step="1" [(ngModel)]="savingsPctInput"><span class="suf">%</span></span>
          </label>
        </div>
        <div class="sum-line" [class.bad]="pctSum !== 100" [class.good]="pctSum === 100">
          Sum: {{ pctSum }}% {{ pctSum === 100 ? '— valid' : '' }}
        </div>
      </button>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary"
              (click)="save()"
              [disabled]="saving() || pctSum !== 100">
        @if (saving()) {
          <span class="btn-spinner" aria-hidden="true"></span>
          <span>Saving…</span>
        } @else {
          <span>Save my plan</span>
        }
      </button>
      <p *ngIf="saved()" class="saved" role="status" aria-live="polite">Saved.</p>
    </div>
  </ng-container>
</div>
