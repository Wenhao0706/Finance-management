<div class="category-bars-card">
  <h3>{{ title }}</h3>
  <div *ngIf="categories.length === 0" class="empty">No expenses recorded for this period.</div>
  <div *ngFor="let cat of categories" class="category-row">
    <span class="cat-name">{{ cat.category }}</span>
    <span class="cat-amount">{{ cat.amount | currency }}</span>
    <div class="bar-track">
      <div class="bar-fill" [style.width.%]="cat.percentage"></div>
    </div>
    <span class="cat-pct">{{ cat.percentage }}%</span>
  </div>
</div>
