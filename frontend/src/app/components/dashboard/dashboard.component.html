<div class="dashboard">
  <header class="period-nav">
    <button class="nav-btn" (click)="goPrev()" aria-label="Previous month">◀</button>
    <h2 class="period-label">{{ monthLabel }}</h2>
    <button class="nav-btn" (click)="goNext()" aria-label="Next month">▶</button>
    <button class="year-toggle" (click)="goYearView()">Year</button>
  </header>

  <div *ngIf="loading()" class="loading">Loading…</div>
  <div *ngIf="loadError()" class="error" role="alert">{{ loadError() }}</div>

  <ng-container *ngIf="!loading() && !loadError() && summary">
    <app-period-summary [summary]="summary"></app-period-summary>
    <app-category-bars [categories]="summary.categoryBreakdown"></app-category-bars>

    <div class="recent-transactions" *ngIf="recentTransactions">
      <h3>Recent transactions</h3>
      <div *ngIf="recentTransactions.length === 0" class="empty">No transactions yet.</div>
      <ul *ngIf="recentTransactions.length > 0">
        <li *ngFor="let txn of recentTransactions">
          <span class="txn-desc">{{ txn.description }}</span>
          <span class="txn-cat">{{ txn.category }}</span>
          <span class="txn-amt" [class.income]="txn.type === 'income'" [class.expense]="txn.type === 'expense'">
            {{ txn.type === 'income' ? '+' : '−' }}{{ txn.amount | currency }}
          </span>
        </li>
      </ul>
      <a routerLink="/transactions" class="view-all">View all transactions →</a>
    </div>

    <a routerLink="/transactions/new" class="add-btn">+ Add transaction</a>
  </ng-container>
</div>
