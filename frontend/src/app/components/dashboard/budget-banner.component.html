<div *ngIf="tier"
     class="budget-banner"
     [class.warn]="tier === 'warn'"
     [class.over]="tier === 'over'"
     role="status">
  <span class="icon" aria-hidden="true">
    <ng-container [ngSwitch]="tier">
      <svg *ngSwitchCase="'over'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <svg *ngSwitchCase="'warn'" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </ng-container>
  </span>
  <span class="msg">{{ message }}</span>
</div>
