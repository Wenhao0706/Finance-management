@if (isInitialized$ | async) {
  @if (isLoggedIn$ | async) {
    <!-- Email verification banner -->
    @if ((emailVerified$ | async) === false) {
      <div class="verify-banner">
        Please verify your email address. Check your inbox for a verification link.
      </div>
    }

    <div class="app-layout" [class.sidebar-open]="sidebarOpen()">
      <!-- Mobile top bar (only visible <= 768px). Holds the hamburger + brand. -->
      <header class="mobile-topbar">
        <button
          type="button"
          class="hamburger"
          (click)="toggleSidebar()"
          [attr.aria-label]="sidebarOpen() ? 'Close menu' : 'Open menu'"
          [attr.aria-expanded]="sidebarOpen()"
          aria-controls="primary-nav"
        >
          @if (sidebarOpen()) {
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          } @else {
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          }
        </button>
        <span class="mobile-brand">FinanceApp</span>
      </header>

      <!-- Backdrop â€” taps outside the open drawer to close. Mobile only. -->
      @if (sidebarOpen()) {
        <div class="backdrop" (click)="closeSidebar()" aria-hidden="true"></div>
      }

      <nav id="primary-nav" class="sidebar" [attr.aria-hidden]="sidebarOpen() ? null : 'true'">
        <div class="brand">
          <h2>FinanceApp</h2>
        </div>
        <ul class="nav-links">
          <li>
            <a routerLink="/dashboard" routerLinkActive="active">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="12" width="7" height="9"></rect>
                <rect x="3" y="16" width="7" height="5"></rect>
              </svg>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a routerLink="/transactions" routerLinkActive="active">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12h-9"></path>
                <path d="M3 6h18"></path>
                <path d="M3 18h12"></path>
              </svg>
              <span>Transactions</span>
            </a>
          </li>
        </ul>
        <div class="sidebar-footer">
          <div class="user-info">{{ userName$ | async }}</div>
          <button class="logout-btn" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Sign out</span>
          </button>
        </div>
      </nav>

      <main class="content">
        <router-outlet />
      </main>
    </div>
  } @else {
    <router-outlet />
  }
}
