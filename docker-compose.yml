services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}"
      POSTGRES_DB: financemanagement
    ports:
      - "127.0.0.1:5432:5432"   # bind loopback only — don't expose Postgres to LAN
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financemanagement"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=financemanagement;Username=postgres;Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      # Same-origin via nginx proxy, plus localhost:4200 for ng serve dev workflow.
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: "http://localhost:4200"
      Cors__AllowedOrigins__2: "https://finance.manhou.de"
      # App Check verification (optional — middleware is skipped if either value is blank).
      # Rollout plan: ship with APPCHECK_ENFORCE=false, monitor backend logs for 48h,
      # then flip to true to start rejecting requests without a valid attestation.
      FIREBASE_PROJECT_NUMBER: "${FIREBASE_PROJECT_NUMBER:-}"
      FIREBASE_APP_ID: "${FIREBASE_APP_ID:-}"
      APPCHECK_ENFORCE: "${APPCHECK_ENFORCE:-false}"
    ports:
      - "127.0.0.1:5143:8080"   # loopback only — public traffic enters via nginx → frontend container
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"               # local-LAN access port; tunnel reaches container directly via Docker network
    restart: unless-stopped

  # Cloudflare Tunnel — exposes the frontend container to the public internet
  # over an outbound-only encrypted connection. No port forwarding needed.
  #
  # Modes:
  #   QUICK (default below): random *.trycloudflare.com URL, no Cloudflare account.
  #     Look at `docker logs finance-tunnel` for the URL after `up`.
  #   NAMED tunnel: set CLOUDFLARE_TUNNEL_TOKEN in .env (created in Cloudflare
  #     dashboard → Zero Trust → Networks → Tunnels) and replace the `command:`
  #     line with: `tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}`.
  #     This routes finance.manhou.de (or any hostname you configure in the
  #     dashboard) to http://frontend:80.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: finance-tunnel
    depends_on:
      - frontend
    # NAMED tunnel (recommended). Token is created in Cloudflare dashboard
    # → Zero Trust → Networks → Tunnels and stored in .env (gitignored).
    # The cloudflared image has no shell, so we pass args directly.
    #
    # To temporarily switch to a QUICK tunnel (random *.trycloudflare.com URL,
    # no Cloudflare account needed), comment out `command:` below and use:
    #   command: tunnel --no-autoupdate --url http://frontend:80
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set in .env}
    restart: unless-stopped

volumes:
  postgres-data:
